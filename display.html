<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>192巷食堂｜大字訂單看板 V5.4.2 FORMAL</title>
<style>
:root{--bg:#f5ead8;--card:#fffaf0;--main:#b23b25;--dark:#333;--green:#2f9e44;--orange:#f08c00;--red:#c92a2a;--gray:#586047;--line:#d9a45f}
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--dark);padding-bottom:20px}header{position:sticky;top:0;z-index:20;background:#5c6148;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.18)}header h1{margin:0;font-size:26px}header .sub{font-size:14px;opacity:.9}.wrap{max-width:1200px;margin:auto;padding:12px}.login{max-width:520px;margin:40px auto;background:var(--card);border-radius:18px;padding:20px;box-shadow:0 4px 18px rgba(0,0,0,.15)}input{width:100%;font-size:24px;padding:14px;border:2px solid #c9b89c;border-radius:12px;background:#fff;color:#333}button{border:0;border-radius:14px;padding:14px 18px;font-size:24px;font-weight:bold;color:#fff;background:#c65f26;cursor:pointer}button:disabled{opacity:.55}.green{background:var(--green)}.orange{background:var(--orange)}.red{background:var(--red)}.gray{background:var(--gray)}.hidden{display:none!important}.topbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.stat{background:#fff;border:2px solid #eadcc6;border-radius:16px;padding:12px;text-align:center}.stat .num{font-size:40px;font-weight:bold;color:var(--main)}.stat .label{font-size:18px;color:#666}.main{display:grid;grid-template-columns:1fr 320px;gap:12px}.order{background:#fff;border:4px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.14)}.order.new{border-color:var(--red)}.order.processing{border-color:var(--orange)}.order.done{border-color:var(--green)}.order-head{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#fff3df;padding:16px 18px;border-bottom:2px solid var(--line)}.order-id{font-size:50px;font-weight:900;color:var(--main);line-height:1}.badge{font-size:26px;color:#fff;border-radius:999px;padding:8px 18px;font-weight:bold;white-space:nowrap}.badge.new{background:var(--red)}.badge.processing{background:var(--orange)}.badge.done{background:var(--green)}.info{padding:16px 18px}.big-row{font-size:32px;font-weight:900;line-height:1.45;margin:6px 0}.money{font-size:52px;color:var(--red);font-weight:900;text-align:right;margin:8px 0}.detail{font-size:28px;font-weight:800;line-height:1.45;background:#fff8e8;border:2px dashed var(--line);border-radius:18px;padding:12px;margin-top:14px}.items-title{font-size:28px;font-weight:900;color:var(--main);margin:0 0 10px}.item-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border-radius:14px;padding:12px 14px;margin:8px 0}.item-row:nth-child(odd){background:#ffffff}.item-row:nth-child(even){background:#fff0cf}.item-name{white-space:pre-wrap}.item-qty{font-size:34px;font-weight:900;color:var(--red);white-space:nowrap}.total-qty{font-size:34px;font-weight:900;color:#111;background:#e6f4ea;border:2px solid #9bd6a7;border-radius:16px;padding:10px 14px;margin:12px 0;text-align:center}.memo{font-size:26px;font-weight:900;color:var(--red);line-height:1.5;background:#ffe3e3;border-radius:14px;padding:12px;margin-top:12px}.actions{display:flex;gap:10px;padding:14px 18px;background:#fffaf0;border-top:2px solid var(--line)}.actions button{flex:1;font-size:30px;padding:18px 10px}.side{background:var(--card);border-radius:20px;padding:12px;box-shadow:0 3px 12px rgba(0,0,0,.12);max-height:calc(100vh - 120px);overflow:auto}.side h2{font-size:24px;color:var(--main);margin:4px 0 10px}.mini{background:#fff;border:2px solid #eadcc6;border-radius:16px;padding:10px;margin:8px 0;cursor:pointer}.mini.active{border-color:var(--red);background:#fff3df}.mini .id{font-size:28px;font-weight:900;color:var(--main)}.mini .txt{font-size:18px;line-height:1.5}.empty{background:#fff;border-radius:22px;text-align:center;padding:60px 20px;font-size:42px;font-weight:bold;color:#777;line-height:1.6}.footer-note{text-align:center;font-size:16px;color:#666;margin-top:10px}.blink{animation:blink 1.1s infinite}@keyframes blink{0%,100%{box-shadow:0 0 0 rgba(201,42,42,0)}50%{box-shadow:0 0 26px rgba(201,42,42,.55)}}
@media(max-width:900px){header h1{font-size:22px}.topbar{grid-template-columns:repeat(2,1fr)}.main{grid-template-columns:1fr}.side{max-height:none}.order-id{font-size:44px}.big-row{font-size:29px}.money{font-size:46px}.detail{font-size:25px}.item-qty{font-size:30px}.actions button{font-size:26px}}
@media(max-width:520px){.wrap{padding:8px}.order-head{display:block}.badge{display:inline-block;margin-top:10px;font-size:22px}.order-id{font-size:38px}.big-row{font-size:26px}.money{font-size:42px;text-align:left}.detail{font-size:23px}.item-row{grid-template-columns:1fr;padding:10px 12px}.item-qty{font-size:28px}.actions{flex-direction:column}.actions button{font-size:28px}.stat .num{font-size:32px}.stat .label{font-size:16px}}
.store-message-display{font-size:28px;font-weight:900;line-height:1.5;background:#fff3bf;border:3px solid #f08c00;border-radius:16px;padding:12px;margin-top:12px;white-space:pre-wrap;color:#5f3b00}
.store-message-display .title{font-size:28px;color:#b23b25;margin-bottom:6px}
.store-message-edit{background:#fff8e8;border:3px dashed #d9a45f;border-radius:16px;padding:12px;margin-top:12px}.store-message-edit label{display:block;font-size:28px;font-weight:900;color:#b23b25;margin-bottom:8px}.store-message-edit textarea{width:100%;min-height:110px;font-size:26px;line-height:1.45;padding:12px;border:2px solid #c9b89c;border-radius:14px;background:#fff;color:#333;resize:vertical}.store-message-edit .row{display:flex;gap:10px;align-items:center;margin-top:10px}.store-message-edit .row button{font-size:26px;padding:12px 18px}.store-message-edit .note{font-size:18px;color:#666;font-weight:bold}

</style>
</head>
<body>
<header>
  <div><h1>📺 192巷食堂｜大字訂單看板 V5.4.2</h1><div class="sub" id="lastUpdate">尚未讀取</div></div>
  <button class="gray" onclick="toggleFullscreen()">全螢幕</button>
</header>

<div id="loginView" class="login">
  <h2 style="font-size:34px;margin:0 0 12px;color:#b23b25">後台密碼</h2>
  <p style="font-size:22px;line-height:1.6">輸入後台密碼後，系統會自動每 5 秒更新訂單。</p>
  <input id="pinInput" type="password" placeholder="請輸入後台密碼" autocomplete="off">
  <button style="width:100%;margin-top:14px" onclick="login()">開啟大字看板</button>
  <div id="loginMsg" style="font-size:20px;color:#c92a2a;margin-top:12px"></div>
</div>

<div id="appView" class="wrap hidden">
  <div class="topbar">
    <div class="stat"><div id="newCount" class="num">0</div><div class="label">新訂單</div></div>
    <div class="stat"><div id="processingCount" class="num">0</div><div class="label">製作中</div></div>
    <div class="stat"><div id="doneCount" class="num">0</div><div class="label">已完成</div></div>
    <div class="stat"><div id="totalCount" class="num">0</div><div class="label">今日訂單</div></div>
  </div>
  <div class="main">
    <div id="bigOrder"></div>
    <div class="side"><h2>今日未完成訂單</h2><div id="orderList"></div></div>
  </div>
  <div class="footer-note">建議：店內手機或平板每天開一次這個頁面，放大字體看單；LINE 只當提醒用。</div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyC6rcxdjOABB5-0wPeTsouz-bWyqzLA96OBjHR5wiN3eexFWxnDqEjSpoN2lFHHXRi_w/exec";
let adminPin = localStorage.getItem('kitchenDisplayPin') || '';
let orders = [];
let selectedOrderId = '';
let timer = null;
let editingStoreMessage = false;
let lastNewKey = '';
let audioCtx = null;

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
    params.callback = cb;
    const qs = Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    const s = document.createElement('script');
    window[cb] = data => { cleanup(); resolve(data); };
    s.onerror = () => { cleanup(); reject(new Error('JSONP failed')); };
    function cleanup(){ delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    s.src = GOOGLE_SCRIPT_URL + '?' + qs;
    document.body.appendChild(s);
  });
}
function login(){
  const pin = document.getElementById('pinInput').value.trim();
  if(!pin){ document.getElementById('loginMsg').textContent = '請輸入密碼'; return; }
  adminPin = pin;
  localStorage.setItem('kitchenDisplayPin', pin);
  start();
}
function start(){
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  loadOrders(true);
  if(timer) clearInterval(timer);
  timer = setInterval(()=>{ if(!editingStoreMessage) loadOrders(false); }, 5000);
}
function loadOrders(first){
  jsonp({action:'adminOrders', pin:adminPin}).then(res=>{
    if(!res.ok){
      localStorage.removeItem('kitchenDisplayPin');
      document.getElementById('appView').classList.add('hidden');
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('loginMsg').textContent = res.message || '讀取失敗，請重新登入';
      return;
    }
    orders = res.orders || [];
    updateSummary(res.summary || {});
    chooseSelected();
    render();
    detectNewOrders();
    document.getElementById('lastUpdate').textContent = '最後更新：' + new Date().toLocaleTimeString('zh-TW',{hour12:false});
  }).catch(()=>{
    document.getElementById('lastUpdate').textContent = '讀取失敗，5秒後會重試';
  });
}
function updateSummary(s){
  document.getElementById('newCount').textContent = s.newCount || 0;
  document.getElementById('processingCount').textContent = s.processingCount || 0;
  document.getElementById('doneCount').textContent = s.doneCount || 0;
  document.getElementById('totalCount').textContent = s.total || 0;
}
function unfinished(){
  const rank = {'新訂單':1,'製作中':2,'已完成':3,'取消':4};
  return orders.filter(o=>o.status==='新訂單'||o.status==='製作中').sort((a,b)=>(rank[a.status]||9)-(rank[b.status]||9));
}
function chooseSelected(){
  const list = unfinished();
  if(!list.length){ selectedOrderId=''; return; }
  if(!selectedOrderId || !list.some(o=>o.orderId===selectedOrderId)) selectedOrderId = list[0].orderId;
}
function render(){
  const list = unfinished();
  const current = list.find(o=>o.orderId===selectedOrderId);
  renderBig(current);
  renderList(list);
}
function renderBig(o){
  const box = document.getElementById('bigOrder');
  if(!o){ box.innerHTML = '<div class="empty">目前沒有未完成訂單<br>有新訂單會自動出現</div>'; return; }
  const cls = o.status === '新訂單' ? 'new blink' : 'processing';
  const badge = o.status === '新訂單' ? 'new' : 'processing';
  const takeIcon = o.takeType === '外送' ? '🚚' : o.takeType === '外帶' ? '📦' : '🍽';
  box.innerHTML = `
    <div class="order ${cls}">
      <div class="order-head"><div class="order-id">${esc(o.orderId||'')}</div><div class="badge ${badge}">${esc(o.status||'')}</div></div>
      <div class="info">
        <div class="big-row">👤 ${esc(o.name || '未填')}</div>
        <div class="big-row">📞 ${esc(o.phone || '')}</div>
        <div class="big-row">${takeIcon} ${esc(o.takeType || '')}　🕒 ${esc(formatDisplayTime(o.arriveTime) || '未填')}</div>
        ${o.address ? `<div class="big-row">📍 ${esc(o.address)}</div>` : ''}
        ${o.company ? `<div class="big-row">🏢 ${esc(o.company)}</div>` : ''}
        ${o.memo ? `<div class="memo">備註：${esc(o.memo)}</div>` : ''}
        ${o.storeMessage ? `<div class="store-message-display"><div class="title">📢 店家留言</div>${esc(o.storeMessage)}</div>` : ''}
        <div class="store-message-edit">
          <label>📢 店家留言（客人查詢會看到）</label>
          <textarea id="displayMsg-${escAttr(o.orderId)}" placeholder="例如：今天訂單較多，預計延後 10 分鐘。" onfocus="editingStoreMessage=true" oninput="editingStoreMessage=true" onblur="setTimeout(()=>{ editingStoreMessage=false; }, 1200)">${esc(o.storeMessage || '')}</textarea>
          <div class="row"><button class="gray" onclick="saveStoreMessage('${escAttr(o.orderId)}')">儲存留言</button><span id="displayMsgNote-${escAttr(o.orderId)}" class="note">輸入時會暫停自動更新，避免文字消失</span></div>
        </div>
        <div class="total-qty">🍱 總餐點數量：${esc(getTotalQty(o))} 份</div>
        <div class="money">$${esc(String(o.amountTotal || 0))}</div>
        <div class="detail">${renderItemRows(o.orderText || '無訂單內容')}</div>
      </div>
      <div class="actions">
        ${o.status==='新訂單' ? `<button class="orange" onclick="updateStatus('${escAttr(o.orderId)}','製作中')">製作中</button>` : ''}
        <button class="green" onclick="updateStatus('${escAttr(o.orderId)}','已完成')">完成</button>
        <button class="red" onclick="cancelOrder('${escAttr(o.orderId)}')">取消</button>
      </div>
    </div>`;
}
function renderList(list){
  const box = document.getElementById('orderList');
  if(!list.length){ box.innerHTML = '<div style="font-size:22px;color:#777;line-height:1.7">目前沒有未完成訂單</div>'; return; }
  box.innerHTML = list.map(o=>`<div class="mini ${o.orderId===selectedOrderId?'active':''}" onclick="selectOrder('${escAttr(o.orderId)}')"><div class="id">${esc(o.orderId||'')}　${esc(o.status||'')}</div><div class="txt">${esc(o.name||'未填')}｜${esc(o.takeType||'')}｜$${esc(String(o.amountTotal||0))}</div></div>`).join('');
}
function selectOrder(id){ selectedOrderId = id; render(); }

function saveStoreMessage(orderId){
  const el = document.getElementById('displayMsg-' + orderId);
  const note = document.getElementById('displayMsgNote-' + orderId);
  if(!el) return;
  editingStoreMessage = true;
  if(note) note.textContent = '儲存中...';
  jsonp({action:'adminSaveStoreMessage', pin:adminPin, orderId:orderId, message:el.value || ''}).then(res=>{
    if(!res.ok){ if(note) note.textContent = res.message || '儲存失敗'; return; }
    if(note) note.textContent = '已儲存';
    editingStoreMessage = false;
    loadOrders(false);
  }).catch(()=>{ if(note) note.textContent = '儲存失敗，請稍後再試'; });
}

function updateStatus(orderId,status){
  jsonp({action:'adminUpdateStatus', pin:adminPin, orderId:orderId, status:status}).then(res=>{
    if(!res.ok){ alert(res.message || '更新失敗'); return; }
    selectedOrderId = '';
    loadOrders(false);
  }).catch(()=>alert('更新失敗，請稍後再試'));
}
function cancelOrder(orderId){ if(confirm('確定取消訂單 ' + orderId + '？')) updateStatus(orderId,'取消'); }

function getTotalQty(o){
  const direct = String(o.qtyTotal || '').replace(/[^0-9]/g,'');
  if(direct) return direct;
  const items = parseOrderItems(o.orderText || '');
  const sum = items.reduce((acc,it)=>acc + (Number(it.qty)||0),0);
  return sum || 0;
}
function renderItemRows(orderText){
  const items = parseOrderItems(orderText);
  if(!items.length) return '<div class="items-title">訂購內容</div><div class="item-row"><div class="item-name">'+esc(cleanOrderText(orderText || '無訂單內容'))+'</div><div class="item-qty"></div></div>';
  return '<div class="items-title">訂購內容</div>' + items.map(it=>
    '<div class="item-row"><div class="item-name">'+esc(it.name)+'</div><div class="item-qty">× '+esc(String(it.qty || ''))+'</div></div>'
  ).join('');
}
function parseOrderItems(t){
  const cleaned = cleanOrderText(t || '');
  return cleaned.split('\n').map(x=>x.trim()).filter(Boolean).filter(line=>{
    if(line === '訂購內容：' || line === '訂購內容:' || line === '訂購內容') return false;
    if(/^總數量/.test(line) || /^總金額/.test(line)) return false;
    return true;
  }).map(line=>{
    let qty = '';
    let name = line;
    const m1 = line.match(/(.+?)\s*[｜|]\s*\$?\d+\s*x\s*(\d+)\s*=/i);
    const m2 = line.match(/(.+?)\s*x\s*(\d+)/i);
    const m3 = line.match(/(.+?)\s*×\s*(\d+)/i);
    if(m1){ name = m1[1].trim(); qty = m1[2]; }
    else if(m2){ name = m2[1].trim(); qty = m2[2]; }
    else if(m3){ name = m3[1].trim(); qty = m3[2]; }
    name = name.replace(/\s*[｜|]\s*\$?\d+\s*$/,'').trim();
    return {name, qty: qty ? Number(qty) : ''};
  });
}

function formatDisplayTime(v){
  const s = String(v || '').trim();
  if(!s) return '';

  // Google Sheet「只填時間」常會回傳 1899-12-30Txx:xx:xx.000Z
  // 轉成台灣看到的 HH:mm，避免畫面出現 1899 年日期。
  if(/^1899-12-30T/i.test(s) || /^\d{4}-\d{2}-\d{2}T/i.test(s)){
    const d = new Date(s);
    if(!isNaN(d.getTime())){
      return d.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false});
    }
  }

  // 已經是 18:30 / 18：30 / 下午 6:30 這類文字就盡量保留原樣。
  const m = s.match(/(上午|下午)?\s*(\d{1,2})[:：](\d{2})/);
  if(m){
    let h = Number(m[2]);
    const min = m[3];
    if(m[1] === '下午' && h < 12) h += 12;
    if(m[1] === '上午' && h === 12) h = 0;
    return String(h).padStart(2,'0') + ':' + min;
  }
  return s;
}

function cleanOrderText(t){
  return String(t)
    .replace(/【192巷食堂】\s*/g,'')
    .replace(/姓名：.*\n?/g,'')
    .replace(/電話：.*\n?/g,'')
    .replace(/取餐方式：.*\n?/g,'')
    .replace(/外送地址：.*\n?/g,'')
    .replace(/公司名稱：.*\n?/g,'')
    .replace(/希望抵達時間\/取餐時間：.*\n?/g,'')
    .replace(/餐具：.*\n?/g,'')
    .replace(/飲料袋：.*\n?/g,'')
    .replace(/總數量：.*\n?/g,'')
    .replace(/總金額：.*\n?/g,'')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}
function detectNewOrders(){
  const key = orders.filter(o=>o.status==='新訂單').map(o=>o.orderId).sort().join('|');
  if(key && key !== lastNewKey) beep();
  lastNewKey = key;
}
function beep(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    [0,0.22,0.44].forEach(offset=>{
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.001, now+offset);
      gain.gain.exponentialRampToValueAtTime(0.18, now+offset+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now+offset+0.16);
      osc.start(now+offset); osc.stop(now+offset+0.18);
    });
  }catch(e){}
}
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  else document.exitFullscreen && document.exitFullscreen();
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escAttr(s){return esc(s).replace(/'/g,'&#39;');}
if(adminPin){ start(); }
</script>
</body>
</html>
