<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>192巷食堂｜大字訂單看板 V5.3.0 TEST</title>
<style>
:root{--bg:#f5ead8;--card:#fffaf0;--main:#b23b25;--dark:#333;--green:#2f9e44;--orange:#f08c00;--red:#c92a2a;--gray:#586047;--line:#d9a45f}
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--dark);padding-bottom:20px}header{position:sticky;top:0;z-index:20;background:#5c6148;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.18)}header h1{margin:0;font-size:26px}header .sub{font-size:14px;opacity:.9}.wrap{max-width:1200px;margin:auto;padding:12px}.login{max-width:520px;margin:40px auto;background:var(--card);border-radius:18px;padding:20px;box-shadow:0 4px 18px rgba(0,0,0,.15)}input{width:100%;font-size:24px;padding:14px;border:2px solid #c9b89c;border-radius:12px;background:#fff;color:#333}button{border:0;border-radius:14px;padding:14px 18px;font-size:24px;font-weight:bold;color:#fff;background:#c65f26;cursor:pointer}button:disabled{opacity:.55}.green{background:var(--green)}.orange{background:var(--orange)}.red{background:var(--red)}.gray{background:var(--gray)}.hidden{display:none!important}.topbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.stat{background:#fff;border:2px solid #eadcc6;border-radius:16px;padding:12px;text-align:center}.stat .num{font-size:40px;font-weight:bold;color:var(--main)}.stat .label{font-size:18px;color:#666}.main{display:grid;grid-template-columns:1fr 320px;gap:12px}.order{background:#fff;border:4px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.14)}.order.new{border-color:var(--red)}.order.processing{border-color:var(--orange)}.order.done{border-color:var(--green)}.order-head{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#fff3df;padding:16px 18px;border-bottom:2px solid var(--line)}.order-id{font-size:58px;font-weight:900;color:var(--main);line-height:1}.badge{font-size:30px;color:#fff;border-radius:999px;padding:8px 18px;font-weight:bold;white-space:nowrap}.badge.new{background:var(--red)}.badge.processing{background:var(--orange)}.badge.done{background:var(--green)}.info{padding:16px 18px}.big-row{font-size:42px;font-weight:900;line-height:1.45;margin:6px 0}.money{font-size:64px;color:var(--red);font-weight:900;text-align:right;margin:8px 0}.detail{font-size:34px;font-weight:800;line-height:1.55;white-space:pre-wrap;background:#fff8e8;border:2px dashed var(--line);border-radius:18px;padding:16px;margin-top:14px}.memo{font-size:32px;font-weight:900;color:var(--red);line-height:1.5;background:#ffe3e3;border-radius:14px;padding:12px;margin-top:12px}.actions{display:flex;gap:10px;padding:14px 18px;background:#fffaf0;border-top:2px solid var(--line)}.actions button{flex:1;font-size:30px;padding:18px 10px}.side{background:var(--card);border-radius:20px;padding:12px;box-shadow:0 3px 12px rgba(0,0,0,.12);max-height:calc(100vh - 120px);overflow:auto}.side h2{font-size:24px;color:var(--main);margin:4px 0 10px}.mini{background:#fff;border:2px solid #eadcc6;border-radius:16px;padding:10px;margin:8px 0;cursor:pointer}.mini.active{border-color:var(--red);background:#fff3df}.mini .id{font-size:28px;font-weight:900;color:var(--main)}.mini .txt{font-size:18px;line-height:1.5}.empty{background:#fff;border-radius:22px;text-align:center;padding:60px 20px;font-size:42px;font-weight:bold;color:#777;line-height:1.6}.footer-note{text-align:center;font-size:16px;color:#666;margin-top:10px}.blink{animation:blink 1.1s infinite}@keyframes blink{0%,100%{box-shadow:0 0 0 rgba(201,42,42,0)}50%{box-shadow:0 0 26px rgba(201,42,42,.55)}}
@media(max-width:900px){header h1{font-size:22px}.topbar{grid-template-columns:repeat(2,1fr)}.main{grid-template-columns:1fr}.side{max-height:none}.order-id{font-size:48px}.big-row{font-size:34px}.money{font-size:54px}.detail{font-size:30px}.actions button{font-size:26px}}
@media(max-width:520px){.wrap{padding:8px}.order-head{display:block}.badge{display:inline-block;margin-top:10px;font-size:24px}.order-id{font-size:44px}.big-row{font-size:30px}.money{font-size:48px;text-align:left}.detail{font-size:27px}.actions{flex-direction:column}.actions button{font-size:28px}.stat .num{font-size:32px}.stat .label{font-size:16px}}
</style>
</head>
<body>
<header>
  <div><h1>📺 192巷食堂｜大字訂單看板</h1><div class="sub" id="lastUpdate">尚未讀取</div></div>
  <button class="gray" onclick="toggleFullscreen()">全螢幕</button>
</header>

<div id="loginView" class="login">
  <h2 style="font-size:34px;margin:0 0 12px;color:#b23b25">後台密碼</h2>
  <p style="font-size:22px;line-height:1.6">輸入後台密碼後，系統會自動每 5 秒更新訂單。</p>
  <input id="pinInput" type="password" placeholder="請輸入後台密碼" autocomplete="off">
  <button style="width:100%;margin-top:14px" onclick="login()">開啟大字看板</button>
  <div id="loginMsg" style="font-size:20px;color:#c92a2a;margin-top:12px"></div>
</div>

<div id="appView" class="wrap hidden">
  <div class="topbar">
    <div class="stat"><div id="newCount" class="num">0</div><div class="label">新訂單</div></div>
    <div class="stat"><div id="processingCount" class="num">0</div><div class="label">製作中</div></div>
    <div class="stat"><div id="doneCount" class="num">0</div><div class="label">已完成</div></div>
    <div class="stat"><div id="totalCount" class="num">0</div><div class="label">今日訂單</div></div>
  </div>
  <div class="main">
    <div id="bigOrder"></div>
    <div class="side"><h2>今日未完成訂單</h2><div id="orderList"></div></div>
  </div>
  <div class="footer-note">建議：店內手機或平板每天開一次這個頁面，放大字體看單；LINE 只當提醒用。</div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyC6rcxdjOABB5-0wPeTsouz-bWyqzLA96OBjHR5wiN3eexFWxnDqEjSpoN2lFHHXRi_w/exec";
let adminPin = localStorage.getItem('kitchenDisplayPin') || '';
let orders = [];
let selectedOrderId = '';
let timer = null;
let lastNewKey = '';
let audioCtx = null;

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
    params.callback = cb;
    const qs = Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    const s = document.createElement('script');
    window[cb] = data => { cleanup(); resolve(data); };
    s.onerror = () => { cleanup(); reject(new Error('JSONP failed')); };
    function cleanup(){ delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    s.src = GOOGLE_SCRIPT_URL + '?' + qs;
    document.body.appendChild(s);
  });
}
function login(){
  const pin = document.getElementById('pinInput').value.trim();
  if(!pin){ document.getElementById('loginMsg').textContent = '請輸入密碼'; return; }
  adminPin = pin;
  localStorage.setItem('kitchenDisplayPin', pin);
  start();
}
function start(){
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  loadOrders(true);
  if(timer) clearInterval(timer);
  timer = setInterval(()=>loadOrders(false), 5000);
}
function loadOrders(first){
  jsonp({action:'adminOrders', pin:adminPin}).then(res=>{
    if(!res.ok){
      localStorage.removeItem('kitchenDisplayPin');
      document.getElementById('appView').classList.add('hidden');
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('loginMsg').textContent = res.message || '讀取失敗，請重新登入';
      return;
    }
    orders = res.orders || [];
    updateSummary(res.summary || {});
    chooseSelected();
    render();
    detectNewOrders();
    document.getElementById('lastUpdate').textContent = '最後更新：' + new Date().toLocaleTimeString('zh-TW',{hour12:false});
  }).catch(()=>{
    document.getElementById('lastUpdate').textContent = '讀取失敗，5秒後會重試';
  });
}
function updateSummary(s){
  document.getElementById('newCount').textContent = s.newCount || 0;
  document.getElementById('processingCount').textContent = s.processingCount || 0;
  document.getElementById('doneCount').textContent = s.doneCount || 0;
  document.getElementById('totalCount').textContent = s.total || 0;
}
function unfinished(){
  const rank = {'新訂單':1,'製作中':2,'已完成':3,'取消':4};
  return orders.filter(o=>o.status==='新訂單'||o.status==='製作中').sort((a,b)=>(rank[a.status]||9)-(rank[b.status]||9));
}
function chooseSelected(){
  const list = unfinished();
  if(!list.length){ selectedOrderId=''; return; }
  if(!selectedOrderId || !list.some(o=>o.orderId===selectedOrderId)) selectedOrderId = list[0].orderId;
}
function render(){
  const list = unfinished();
  const current = list.find(o=>o.orderId===selectedOrderId);
  renderBig(current);
  renderList(list);
}
function renderBig(o){
  const box = document.getElementById('bigOrder');
  if(!o){ box.innerHTML = '<div class="empty">目前沒有未完成訂單<br>有新訂單會自動出現</div>'; return; }
  const cls = o.status === '新訂單' ? 'new blink' : 'processing';
  const badge = o.status === '新訂單' ? 'new' : 'processing';
  const takeIcon = o.takeType === '外送' ? '🚚' : o.takeType === '外帶' ? '📦' : '🍽';
  box.innerHTML = `
    <div class="order ${cls}">
      <div class="order-head"><div class="order-id">${esc(o.orderId||'')}</div><div class="badge ${badge}">${esc(o.status||'')}</div></div>
      <div class="info">
        <div class="big-row">👤 ${esc(o.name || '未填')}</div>
        <div class="big-row">📞 ${esc(o.phone || '')}</div>
        <div class="big-row">${takeIcon} ${esc(o.takeType || '')}　🕒 ${esc(o.arriveTime || '未填')}</div>
        ${o.address ? `<div class="big-row">📍 ${esc(o.address)}</div>` : ''}
        ${o.company ? `<div class="big-row">🏢 ${esc(o.company)}</div>` : ''}
        ${o.memo ? `<div class="memo">備註：${esc(o.memo)}</div>` : ''}
        <div class="money">$${esc(String(o.amountTotal || 0))}</div>
        <div class="detail">${esc(cleanOrderText(o.orderText || '無訂單內容'))}</div>
      </div>
      <div class="actions">
        ${o.status==='新訂單' ? `<button class="orange" onclick="updateStatus('${escAttr(o.orderId)}','製作中')">製作中</button>` : ''}
        <button class="green" onclick="updateStatus('${escAttr(o.orderId)}','已完成')">完成</button>
        <button class="red" onclick="cancelOrder('${escAttr(o.orderId)}')">取消</button>
      </div>
    </div>`;
}
function renderList(list){
  const box = document.getElementById('orderList');
  if(!list.length){ box.innerHTML = '<div style="font-size:22px;color:#777;line-height:1.7">目前沒有未完成訂單</div>'; return; }
  box.innerHTML = list.map(o=>`<div class="mini ${o.orderId===selectedOrderId?'active':''}" onclick="selectOrder('${escAttr(o.orderId)}')"><div class="id">${esc(o.orderId||'')}　${esc(o.status||'')}</div><div class="txt">${esc(o.name||'未填')}｜${esc(o.takeType||'')}｜$${esc(String(o.amountTotal||0))}</div></div>`).join('');
}
function selectOrder(id){ selectedOrderId = id; render(); }
function updateStatus(orderId,status){
  jsonp({action:'adminUpdateStatus', pin:adminPin, orderId:orderId, status:status}).then(res=>{
    if(!res.ok){ alert(res.message || '更新失敗'); return; }
    selectedOrderId = '';
    loadOrders(false);
  }).catch(()=>alert('更新失敗，請稍後再試'));
}
function cancelOrder(orderId){ if(confirm('確定取消訂單 ' + orderId + '？')) updateStatus(orderId,'取消'); }
function cleanOrderText(t){
  return String(t)
    .replace(/【192巷食堂】\s*/g,'')
    .replace(/姓名：.*\n?/g,'')
    .replace(/電話：.*\n?/g,'')
    .replace(/取餐方式：.*\n?/g,'')
    .replace(/外送地址：.*\n?/g,'')
    .replace(/公司名稱：.*\n?/g,'')
    .replace(/希望抵達時間\/取餐時間：.*\n?/g,'')
    .replace(/餐具：.*\n?/g,'')
    .replace(/飲料袋：.*\n?/g,'')
    .replace(/總數量：.*\n?/g,'')
    .replace(/總金額：.*\n?/g,'')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}
function detectNewOrders(){
  const key = orders.filter(o=>o.status==='新訂單').map(o=>o.orderId).sort().join('|');
  if(key && key !== lastNewKey) beep();
  lastNewKey = key;
}
function beep(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    [0,0.22,0.44].forEach(offset=>{
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.001, now+offset);
      gain.gain.exponentialRampToValueAtTime(0.18, now+offset+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now+offset+0.16);
      osc.start(now+offset); osc.stop(now+offset+0.18);
    });
  }catch(e){}
}
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  else document.exitFullscreen && document.exitFullscreen();
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escAttr(s){return esc(s).replace(/'/g,'&#39;');}
if(adminPin){ start(); }
</script>
</body>
</html>
