<body>
<header><h1>１９２巷食堂｜團購訂單</h1><p>主揪建立團購連結，同事各自填餐點，最後由主揪彙整送出</p></header>
<div class="container">
  <section id="createPanel" class="card hidden">
    <h2>建立團購連結</h2>
    <div class="grid">
      <div><label>主揪姓名</label><input id="hostName" placeholder="例如：王小姐"></div>
      <div><label>主揪電話</label><input id="hostPhone" placeholder="店家聯絡用"></div>
      <div><label>公司名稱</label><input id="groupCompany" placeholder="例如：XX科技"></div>
      <div><label>希望抵達/取餐時間</label><input id="groupArriveTime" placeholder="例如：12:00"></div>
      <div><label>取餐方式</label><select id="groupTakeType"><option>外送</option><option>外帶</option></select></div>
      <div><label>外送地址</label><input id="groupAddress" placeholder="外送時填寫"></div>
    </div>
    <label>團購備註</label><textarea id="groupMemo" rows="3" placeholder="例如：請分袋、公司統一收款"></textarea>
    <button style="width:100%;margin-top:12px" onclick="createGroup()">建立團購網址</button>
    <div id="createResult" class="notice hidden" style="margin-top:12px"></div>
  </section>

  <section id="groupPanel" class="hidden">
    <div class="card">
      <h2 id="groupTitle">團購填單</h2>
      <div id="groupInfo" class="small"></div>
      <div class="notice" style="margin-top:10px">請每位同事各自填寫姓名與餐點，送出後會加入團購彙總。主揪最後再按「送出總訂單給店家」。</div><div id="storeNotice" class="store-warning hidden"></div>
    </div>
    <div class="tabs">
      <button id="tabOrder" class="active" onclick="switchTab('order')">📝 我要點餐</button>
      <button id="tabSummary" onclick="switchTab('summary')">📋 團購彙總</button>
      <button id="tabHost" onclick="switchTab('host')">🚀 主揪送出</button>
    </div>
    <section id="orderTab">
      <div class="card"><h2>填單人資料</h2><div class="grid"><div><label>姓名 <span style="color:red">*</span></label><input id="buyerName" placeholder="請輸入姓名"></div><div><label>電話/分機</label><input id="buyerPhone" placeholder="可不填"></div></div></div>
      <div class="card"><h2>選擇餐點</h2><div class="category-nav" id="categoryNav"></div><div id="menu"></div></div>
      <div class="card"><h2>個人備註</h2><textarea id="buyerMemo" rows="3" placeholder="例如：不要辣、飯少一點"></textarea></div>
    </section>
    <section id="summaryTab" class="hidden"><div class="card"><h2>目前團購彙總</h2><div id="summaryBox" class="empty">讀取中...</div></div></section>
    <section id="hostTab" class="hidden"><div class="card"><h2>主揪送出總訂單</h2><div class="notice">確認所有同事都填完後，按下方按鈕會把整筆團購送到店家後台與 LINE 通知。</div><button class="green" style="width:100%;margin-top:12px" onclick="submitGroupToStore()">送出總訂單給店家</button><div id="hostMsg" class="small" style="margin-top:10px;color:#b23b25"></div></div></section>
  </section>
</div>
<div class="bottom-bar hidden" id="bottomBar"><div class="bottom-total">🛒 <span id="qtyTotal">0</span> 份　<span id="amountTotal">$0</span></div><button onclick="submitMyOrder()">加入團購</button><button class="gray" onclick="resetMyOrder()">清空</button></div>
<script>

const categories=[
{name:"主廚獨家｜飯類",hint:"加飯15元、加起司1片15元、2片25元",mode:"multi",items:[

{name:"鍋燒",hint:"加飯/加麵15元、加鳥龍麵30元、加起司1片15元、2片25元，加沙茶5元",mode:"multi",mainSet:"pot",items:[
{name:"原味豬",price:100,addonSet:"pot"},{name:"原味蝦",price:100,addonSet:"pot"},{name:"泡菜",price:135,addonSet:"pot"},{name:"味噌",price:125,addonSet:"pot"},{name:"塔香蛤蜊",price:130,addonSet:"pot"},{name:"起司牛奶",price:150,addonSet:"pot"},{name:"蝦多多",price:170,addonSet:"pot"}]},

{name:"炸物",mode:"direct",items:[{name:"唐揚雞",price:110},{name:"日式炸蝦(2隻)",price:99},{name:"廣島炸牡蠣(3顆)",price:99},{name:"廣島炸牡蠣(2顆)",price:75},{name:"起司可樂餅",price:90},{name:"青花椒香酥雞",price:69},{name:"手切馬鈴薯",price:55},{name:"炸雞塊",price:50},{name:"酥炸薯條",price:50},{name:"手工黑輪",price:50},{name:"手作芋球",price:40}]},
{name:"湯品",mode:"direct",items:[{name:"蛤蜊湯",price:45},{name:"蛋花湯",price:30}]},
{name:"小菜",mode:"direct",items:[{name:"蒜味鮮蝦",price:135},{name:"薑蒸蛤蜊",price:100},{name:"胡麻花椰菜",price:55},{name:"川燙時蔬",price:45},{name:"皮蛋豆腐",price:50}]},
{name:"飲品",mode:"direct",items:[{name:"冰淇淋紅茶",price:65},{name:"紅茶牛奶",price:55},{name:"私房紅茶",price:35},{name:"彈珠汽水",price:35},{name:"泰式奶茶",price:65},{name:"柚子茶",price:55},{name:"無糖綠茶",price:40}]},
{name:"套餐 : 凡點主食即可加購",mode:"multi",addonTitle:"換購飲料",items:[{name:"A套餐：酥炸脆薯＋私房紅茶",price:75,addonSet:"combo"},{name:"B套餐：手工黑輪＋私房紅茶",price:75,addonSet:"combo"},{name:"C套餐：川燙時蔬＋私房紅茶",price:70,addonSet:"combo"}]}
];


const gid = new URLSearchParams(location.search).get('gid') || '';
let groupInfo = null;
let menuStatusMap = {};
let storeInfo = null;
function jsonp(params){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*99999);params.callback=cb;params.t=Date.now();const qs=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');const s=document.createElement('script');window[cb]=data=>{delete window[cb];s.remove();resolve(data)};s.onerror=()=>{delete window[cb];s.remove();reject(new Error('讀取失敗'))};s.src=GOOGLE_SCRIPT_URL+'?'+qs;document.body.appendChild(s);})}
function init(){
  if(!gid){
    document.getElementById('createPanel').classList.remove('hidden');
  }else{
    document.getElementById('groupPanel').classList.remove('hidden');
    document.getElementById('bottomBar').classList.remove('hidden');
    loadMenuStatus().then(()=>{renderMenu();loadGroup();}).catch(()=>{renderMenu();loadGroup();});
  }
}

function loadMenuStatus(){
  return jsonp({action:'status'}).then(res=>{
    if(!res || !res.ok) return;
    menuStatusMap = {};
    (res.items || []).forEach(item=>{
      const key = clean(item.name || '');
      menuStatusMap[key] = item;
    });
    storeInfo = res.store || null;
    const notice = document.getElementById('storeNotice');
    if(notice && storeInfo && storeInfo.isOrderAllowed === false){
      notice.textContent = storeInfo.message || '目前暫停接單';
      notice.classList.remove('hidden');
      const bar = document.getElementById('bottomBar');
      if(bar) bar.classList.add('hidden');
    }else if(notice){
      notice.classList.add('hidden');
    }
  });
}
function getMenuStatusForItem(item){return menuStatusMap[clean(item.name)] || null;}
function isSoldStatus(status){return /售完|停售|暫停|隱藏/.test(String(status || ''));}
function isItemUnavailable(item){
  if(storeInfo && storeInfo.isOrderAllowed === false) return true;
  const st = getMenuStatusForItem(item);
  return st ? isSoldStatus(st.status) || String(st.hidden||'').toUpperCase()==='TRUE' || st.hidden==='是' : false;
}
function itemStatusNote(item){
  if(storeInfo && storeInfo.isOrderAllowed === false) return storeInfo.message || '目前暫停接單';
  const st = getMenuStatusForItem(item);
  return st && st.note ? String(st.note) : '此品項目前售完';
}
function createGroup(){const hostName=v('hostName'), hostPhone=v('hostPhone'), company=v('groupCompany'), arriveTime=v('groupArriveTime'), takeType=v('groupTakeType'), address=v('groupAddress'), memo=v('groupMemo');if(!hostName) return alert('請填主揪姓名');jsonp({action:'groupCreate',hostName,hostPhone,company,arriveTime,takeType,address,memo}).then(res=>{if(!res.ok)return alert(res.message||'建立失敗');const url=location.origin+location.pathname+'?gid='+res.groupId;document.getElementById('createResult').classList.remove('hidden');document.getElementById('createResult').innerHTML='團購已建立：<br><b>'+res.groupId+'</b><br><input value="'+url+'" readonly onclick="this.select()"><button style="width:100%;margin-top:8px" onclick="navigator.clipboard.writeText(''+url+'');alert('網址已複製')">複製團購網址</button>';}).catch(()=>alert('建立失敗'));}
function loadGroup(){jsonp({action:'groupGet',gid}).then(res=>{if(!res.ok)return alert(res.message||'讀取團購失敗');groupInfo=res.group;document.getElementById('groupTitle').textContent='團購填單｜'+(groupInfo.company||groupInfo.groupId);document.getElementById('groupInfo').innerHTML=`主揪：${esc(groupInfo.hostName||'')}　電話：${esc(groupInfo.hostPhone||'')}<br>取餐：${esc(groupInfo.takeType||'')}　時間：${esc(groupInfo.arriveTime||'')}<br>${groupInfo.address?'地址：'+esc(groupInfo.address)+'<br>':''}狀態：${esc(groupInfo.status||'開團中')}`;renderSummary(res);}).catch(()=>alert('讀取團購失敗'));}
function switchTab(t){['order','summary','host'].forEach(x=>{document.getElementById(x+'Tab').classList.toggle('hidden',x!==t);document.getElementById('tab'+cap(x)).classList.toggle('active',x===t);});if(t==='summary'||t==='host')loadGroup();} function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}
function renderCategoryNav(){const nav=document.getElementById('categoryNav');if(!nav)return;nav.innerHTML=categories.map((cat,ci)=>`<button type="button" onclick="scrollToCategory(${ci})">🛵 ${esc(cat.name)}</button>`).join('');}
function scrollToCategory(ci){const el=document.getElementById('cat-'+ci);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function renderMenu(){renderCategoryNav();const menu=document.getElementById('menu');menu.innerHTML='';categories.forEach((cat,ci)=>{let h=`<div class="category" id="cat-${ci}"><div class="category-title">${cat.name}</div>`;cat.items.forEach((item,ii)=>{const sold=isItemUnavailable(item);h+=`<div class="item-card ${sold?'soldout':''}"><div class="item-head"><div class="item-name">${clean(item.name)}${sold?'<span class="soldout-badge">售完</span>':''}</div><div class="price">$${item.price}</div></div>`;if(sold){h+=`<div class="status-note">${esc(itemStatusNote(item))}</div>`;}if(cat.mode==='direct'){h+=`<div class="row"><label>數量</label><div class="qtybox"><button class="qtybtn" ${sold?'disabled':''} onclick="changeDirectQty(${ci},${ii},-1)">-</button><input class="qty direct-qty" id="direct-${ci}-${ii}" value="0" type="number" min="0" ${sold?'disabled':''} oninput="calculate()"><button class="qtybtn" ${sold?'disabled':''} onclick="changeDirectQty(${ci},${ii},1)">+</button></div></div><div class="row"><label>備註</label><input class="direct-remark" id="direct-remark-${ci}-${ii}" placeholder="備註" ${sold?'disabled':''}></div><div class="subtotal" id="direct-sub-${ci}-${ii}">$0</div>`}else{h+=`<div id="lines-${ci}-${ii}"></div><button class="green" ${sold?'disabled':''} onclick="addLine(${ci},${ii})">新增一筆</button>`}h+='</div>';});h+='</div>';menu.innerHTML+=h;})}
function addLine(ci,ii){const cat=categories[ci],item=cat.items[ii];if(isItemUnavailable(item)){alert('此品項目前售完，無法加入');return;}const box=document.getElementById(`lines-${ci}-${ii}`);const id='q'+Date.now()+Math.floor(Math.random()*999);const hasMain=item.mainSet||cat.mainSet;const main=hasMain?`<div class="row"><label>主食</label><select class="mainfood" onchange="calculate()"><option value="REQUIRED" selected disabled>請選擇主食</option>${(mainSets[item.mainSet||cat.mainSet]||[]).map(o=>`<option value="${o[1]}">${o[0]}${o[1]?'+$'+o[1]:''}</option>`).join('')}</select></div>`:'';const opts=getAddonOptions(item);const addon=opts.length?`<div class="row"><label>${String(cat.name).includes('套餐')?'換購':'加購'}</label><select class="addon" onchange="calculate()"><option value="0">無</option>${opts.map(o=>`<option value="${o[1]}">${o[0]}${o[1]?'+$'+o[1]:''}</option>`).join('')}</select></div>`:'';const div=document.createElement('div');div.className='line-card';div.dataset.name=item.name;div.dataset.price=item.price;div.innerHTML=`<div class="row"><label>數量</label><div class="qtybox"><button class="qtybtn" onclick="changeLineQty('${id}',-1)">-</button><input class="qty" id="${id}" value="1" type="number" min="1" oninput="calculate()"><button class="qtybtn" onclick="changeLineQty('${id}',1)">+</button></div></div>${main}${addon}<div class="row"><label>備註</label><input class="remark" placeholder="備註"></div><div class="subtotal line-sub">$${item.price}</div><button class="gray" onclick="this.closest('.line-card').remove();calculate()">刪除</button>`;box.appendChild(div);calculate();}
function getAddonOptions(item){return (item.addonSet&&optionSets[item.addonSet]?optionSets[item.addonSet]:[]).concat(Array.isArray(item.addonExtra)?item.addonExtra:[]);}
function changeLineQty(id,d){const el=document.getElementById(id);el.value=Math.max(1,Number(el.value||1)+d);calculate();} function changeDirectQty(ci,ii,d){const el=document.getElementById(`direct-${ci}-${ii}`);el.value=Math.max(0,Number(el.value||0)+d);calculate();}
function calculate(){let q=0,a=0;document.querySelectorAll('.line-card').forEach(row=>{const qty=Number(row.querySelector('.qty').value||0),base=Number(row.dataset.price||0);const mainEl=row.querySelector('.mainfood');const main=mainEl&&mainEl.value!=='REQUIRED'?Number(mainEl.value||0):0;const addon=Number(row.querySelector('.addon')?.value||0);const sub=qty*(base+main+addon);q+=qty;a+=sub;row.querySelector('.line-sub').textContent='$'+sub;});categories.forEach((cat,ci)=>{if(cat.mode!=='direct')return;cat.items.forEach((item,ii)=>{const el=document.getElementById(`direct-${ci}-${ii}`);if(!el)return;if(isItemUnavailable(item)){el.value=0;return;}const qty=Number(el.value||0),sub=qty*item.price;q+=qty;a+=sub;document.getElementById(`direct-sub-${ci}-${ii}`).textContent='$'+sub;})});document.getElementById('qtyTotal').textContent=q;document.getElementById('amountTotal').textContent='$'+a;return {qtyTotal:q,amountTotal:a};}
function buildMyOrder(){const buyer=v('buyerName'),phone=v('buyerPhone');if(!buyer){alert('請填姓名');return null}let lines=[],items=[],qtyTotal=0,amountTotal=0,missing='';document.querySelectorAll('.line-card').forEach(row=>{const qty=Number(row.querySelector('.qty').value||0);if(qty<=0)return;const base=Number(row.dataset.price||0);const mainEl=row.querySelector('.mainfood');if(mainEl&&mainEl.value==='REQUIRED'){missing=clean(row.dataset.name);return}const main=mainEl?Number(mainEl.value||0):0, addonEl=row.querySelector('.addon'), addon=addonEl?Number(addonEl.value||0):0, unit=base+main+addon, sub=unit*qty;let d=clean(row.dataset.name);if(mainEl)d+=`｜主食:${mainEl.options[mainEl.selectedIndex].text}`;if(addonEl&&addon>0)d+=`｜加購:${addonEl.options[addonEl.selectedIndex].text}`;const rem=row.querySelector('.remark')?.value.trim();if(rem)d+=`｜備註:${rem}`;d+=`｜$${unit} x ${qty} = $${sub}`;items.push(d);qtyTotal+=qty;amountTotal+=sub;});if(missing){alert('「'+missing+'」請先選擇主食');return null}categories.forEach((cat,ci)=>{if(cat.mode!=='direct')return;cat.items.forEach((item,ii)=>{const el=document.getElementById(`direct-${ci}-${ii}`);if(!el)return;const qty=Number(el.value||0);if(qty<=0)return;let d=clean(item.name);const rem=document.getElementById(`direct-remark-${ci}-${ii}`)?.value.trim();if(rem)d+=`｜備註:${rem}`;const sub=qty*item.price;d+=`｜$${item.price} x ${qty} = $${sub}`;items.push(d);qtyTotal+=qty;amountTotal+=sub;})});if(qtyTotal===0){alert('請先選擇餐點');return null}const memo=v('buyerMemo');lines.push(`【${buyer}】${phone?' '+phone:''}`);items.forEach(x=>lines.push(x));lines.push(`小計：${qtyTotal}份，$${amountTotal}`);if(memo)lines.push('備註：'+memo);return {buyerName:buyer,buyerPhone:phone,items,orderText:lines.join('
'),qtyTotal,amountTotal,memo};}
function submitMyOrder(){if(storeInfo && storeInfo.isOrderAllowed === false){alert(storeInfo.message || '目前暫停接單');return;}const o=buildMyOrder();if(!o)return;if(!confirm('確定加入團購？'))return;jsonp({action:'groupAddOrder',gid,buyerName:o.buyerName,buyerPhone:o.buyerPhone,orderText:o.orderText,items:JSON.stringify(o.items),qtyTotal:o.qtyTotal,amountTotal:o.amountTotal,memo:o.memo}).then(res=>{if(!res.ok)return alert(res.message||'送出失敗');alert('已加入團購');resetMyOrder();loadGroup();switchTab('summary');}).catch(()=>alert('送出失敗'));}
function resetMyOrder(){document.querySelectorAll('.line-card').forEach(x=>x.remove());document.querySelectorAll('.direct-qty').forEach(x=>x.value=0);document.querySelectorAll('.direct-remark,.remark').forEach(x=>x.value='');document.getElementById('buyerMemo').value='';calculate();}
function renderSummary(res){const box=document.getElementById('summaryBox');if(!box)return;const entries=res.entries||[];if(!entries.length){box.innerHTML='<div class="empty">目前尚無同事填單</div>';return}let html=`<div class="summary-line"><b>目前人數</b><b>${entries.length} 人</b></div><div class="summary-line"><b>總數量</b><b>${res.totalQty||0} 份</b></div><div class="summary-line"><b>總金額</b><b>$${res.totalAmount||0}</b></div>`;entries.forEach(e=>{html+=`<div class="participant-card"><b>${esc(e.buyerName||'未填')}</b>　<span class="small">${esc(e.buyerPhone||'')}</span><br><pre style="white-space:pre-wrap;font-family:inherit;margin:8px 0 0">${esc(e.orderText||'')}</pre></div>`});box.innerHTML=html;}
function submitGroupToStore(){if(!confirm('確定送出總訂單給店家？送出後店家後台會收到一筆團購訂單。'))return;jsonp({action:'groupSubmit',gid}).then(res=>{if(!res.ok)return alert(res.message||'送出失敗');document.getElementById('hostMsg').textContent='已送出給店家，訂單編號：'+(res.orderId||'');alert('已送出給店家');loadGroup();}).catch(()=>alert('送出失敗'));}
function v(id){return document.getElementById(id)?.value.trim()||''} function clean(s){return String(s||'').replace(/🌶️/g,'').replace(/🌶/g,'').trim()} function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
init();
</script>
