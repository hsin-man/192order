<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>192巷食堂</title>
<style>
body{font-family:"Microsoft JhengHei",Arial,sans-serif;background:#f5ead8;margin:0;color:#333}
header{background:#5c6148;color:#fff;text-align:center;padding:24px}
header h1{margin:0;font-size:30px}
header p{margin:8px 0 0;font-size:15px}
.container{max-width:1250px;margin:auto;padding:18px}
.card{background:#fffaf0;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 4px 14px rgba(0,0,0,.12)}
h2{margin:0 0 12px;color:#b23b25;border-bottom:2px solid #d9a45f;padding-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
label{font-weight:bold;font-size:14px}
input,select,textarea{width:100%;box-sizing:border-box;padding:9px;border:1px solid #c9b89c;border-radius:8px;font-size:15px;background:white}
table{width:100%;border-collapse:collapse;background:white;table-layout:fixed}
th,td{padding:8px;border-bottom:1px solid #eadcc6;text-align:center;vertical-align:middle}
th{background:#ead3aa;color:#4f3c24}
td:first-child,th:first-child{text-align:left}
.category{margin-top:20px}
.category-title{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.category-title .hint{font-size:13px;color:#777;font-weight:normal}
.small{font-size:13px;color:#777}
.notice{background:#fff4cc;border-left:6px solid #f08c00;padding:12px;border-radius:8px;line-height:1.8}
.red-bold{color:red;font-weight:bold}
.summary{position:sticky;bottom:0;background:#fff3df;border:2px solid #d9a45f}
.total{font-size:30px;color:#c92a2a;font-weight:bold}
button{border:0;background:#c65f26;color:white;border-radius:9px;padding:10px 14px;font-size:15px;cursor:pointer;margin:4px}
button.secondary{background:#586047}
button.add{background:#2f9e44;width:100%;padding:8px 4px;font-size:14px;margin:0}
button.delete{background:#868e96;width:100%;padding:7px 4px;font-size:13px;margin:0}
.product-row{background:#fff}
.order-line{background:#fffdf7}
.order-line td{border-bottom:1px dashed #e4cfae}
.blank{background:#fffaf0;color:#bbb}
input.qty{width:64px;text-align:center}
.remark{min-width:110px}
.col-item{width:28%}
.col-price{width:8%}
.col-qty{width:8%}
.col-main{width:13%}
.col-addon{width:18%}
.col-remark{width:18%}
.col-sub{width:8%}
.col-action{width:8%}
.direct .col-item{width:42%}
.direct .col-price{width:12%}
.direct .col-qty{width:12%}
.direct .col-remark{width:22%}
.direct .col-sub{width:12%}
table select{width:100%;min-width:0}
@media(max-width:900px){
  .grid{grid-template-columns:1fr}
  table{font-size:12px}
  th,td{padding:6px 3px}
  input.qty{width:50px}
  button.add,button.delete{font-size:12px}
  .container{padding:10px}
}

/* V4.2 手機優化：表格不重疊、底部購物車不遮擋 */
.table-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}

.table-wrap table{
  min-width:980px;
}

.direct .table-wrap table{
  min-width:680px;
}

.mobile-cart{
  display:none;
}

@media(max-width:900px){
  body{
    padding-bottom:82px;
  }

  .card{
    padding:12px;
  }

  .summary{
    display:none;
  }

  .mobile-cart{
    display:block;
    position:fixed;
    left:10px;
    right:10px;
    bottom:10px;
    z-index:9999;
    background:#fff3df;
    border:2px solid #d9a45f;
    border-radius:16px;
    box-shadow:0 4px 18px rgba(0,0,0,.25);
    overflow:hidden;
  }

  .mobile-cart-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    font-size:18px;
    font-weight:bold;
    color:#b23b25;
    cursor:pointer;
  }

  .mobile-cart-total{
    color:#c92a2a;
    font-size:22px;
  }

  .mobile-cart-panel{
    display:none;
    padding:12px 14px 16px;
    border-top:1px solid #d9a45f;
    background:#fffaf0;
  }

  .mobile-cart.open .mobile-cart-panel{
    display:block;
  }

  .mobile-cart-panel button{
    width:100%;
    margin:5px 0;
  }

  .table-wrap{
    border:1px solid #eadcc6;
    border-radius:8px;
    background:white;
  }

  table{
    font-size:13px;
  }

  th,td{
    white-space:nowrap;
    overflow:visible;
    padding:7px 6px;
  }

  td:first-child,th:first-child{
    min-width:190px;
    white-space:normal;
  }

  select{
    min-width:130px;
  }

  .remark{
    min-width:160px;
  }

  input.qty{
    width:64px;
  }

  button.add,button.delete{
    min-width:76px;
  }
}

</style>
</head>
<body>
<header>
<h1>192巷食堂</h1>
<p>高雄市左營區文慈路192巷26號｜07-350-1245｜營業時間 10:00–20:00</p>
</header>

<div class="container">
<div class="card">
<h2>訂購人資料</h2>
<div class="grid">
<div><label>姓名</label><input id="name" placeholder="請輸入姓名" autocomplete="off"></div>
<div><label>電話</label><input id="phone" placeholder="請輸入電話" autocomplete="off"></div>
<div><label>取餐方式</label><select id="takeType" onchange="toggleAddressRequired()"><option>外送</option><option>外帶</option><option>內用</option></select></div>
<div><label>外送地址 <span id="addressRequiredText" style="color:red">*</span></label><input id="address" placeholder="外送時必填" autocomplete="off"></div>
<div><label>公司名稱</label><input id="company" placeholder="請輸入公司名稱" autocomplete="off"></div>
<div><label>希望抵達時間</label><input id="arriveTime" type="text" placeholder="例如：18:30"></div>
<div><label>餐具</label><select id="utensils"><option>不需要餐具</option><option>需要餐具</option></select></div>
</div>
<p class="notice">外送注意事項:<br>2公里內滿500元可外送，需於90分鐘前預訂。<br><span class="red-bold">假日及國定假日無外送服務。</span></p>
</div>

<div class="card">
<div id="menu"></div>
</div>



<div class="card">
<h2>加購飲料袋 ($1元)</h2>
<div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;font-size:16px">
<label style="font-weight:normal"><input type="radio" name="drinkBag" value="0" checked onchange="calculate()" style="width:auto;margin-right:6px">不需要</label>
<label style="font-weight:normal"><input type="radio" name="drinkBag" value="1" onchange="calculate()" style="width:auto;margin-right:6px">需要 (+$1)</label>
</div>
</div>

<div class="card">
<h2>整體備註</h2>
<textarea id="memo" rows="4" placeholder="例如：不要辣、分開裝、指定取餐時間"></textarea>
</div>

<div class="card summary">
<h2>訂單總計</h2>
<div>總數量：<span id="qtyTotal">0</span> 份</div>
<div>總金額：<span class="total" id="amountTotal">$0</span></div>
<button onclick="copyOrder()">複製訂單文字</button>
<button onclick="submitOrder()">送出訂單</button>
<button class="secondary" onclick="resetOrder()">清空訂單</button>
</div>
</div>

<div class="mobile-cart" id="mobileCart">
  <div class="mobile-cart-bar" onclick="toggleMobileCart()">
    <span>🛒 <span id="mobileQtyTotal">0</span> 份</span>
    <span class="mobile-cart-total" id="mobileAmountTotal">$0</span>
  </div>
  <div class="mobile-cart-panel">
    <button onclick="copyOrder()">複製訂單文字</button>
    <button onclick="submitOrder()">送出訂單</button>
    <button class="secondary" onclick="resetOrder()">清空訂單</button>
  </div>
</div>

  {name:"炸物", hint:"", mode:"direct", items:[
    {name:"唐揚雞",price:110},{name:"日式炸蝦(2隻)",price:99},{name:"廣島炸牡蠣(3顆)",price:99},{name:"廣島炸牡蠣(2顆)",price:75},{name:"起司可樂餅",price:90},{name:"青花椒香酥雞",price:69},{name:"手切馬鈴薯",price:55},{name:"炸雞塊",price:50},{name:"酥炸薯條",price:50},{name:"手工黑輪",price:50},{name:"手作芋球",price:40}

  {name:"飲品", hint:"", mode:"direct", items:[
    {name:"冰淇淋紅茶",price:65},{name:"紅茶牛奶",price:55},{name:"私房紅茶",price:35},{name:"彈珠汽水",price:35},{name:"泰式奶茶",price:65},{name:"柚子茶",price:55},{name:"無糖綠茶",price:40}
  ]},
  {name:"套餐 : 凡點主食即可加購", hint:"", mode:"addonOnly", addonTitle:"換購飲料", remark:true, items:[
    {name:"A套餐：酥炸脆薯＋私房紅茶",price:75, addonSet:"combo"},
    {name:"B套餐：手工黑輪＋私房紅茶",price:75, addonSet:"combo"},
    {name:"C套餐：川燙時蔬＋私房紅茶",price:70, addonSet:"combo"}
  ]}
];

const menu = document.getElementById("menu");


function toggleMobileCart(){
  const cart = document.getElementById("mobileCart");
  if(cart) cart.classList.toggle("open");
}

function toggleAddressRequired(){
  const takeType = document.getElementById("takeType").value;
  const address = document.getElementById("address");
  const requiredText = document.getElementById("addressRequiredText");
  address.required = takeType === "外送";
  requiredText.style.display = takeType === "外送" ? "inline" : "none";
}

function categoryTitle(cat){
  return `<div class="category-title"><h2>${cat.name}</h2>${cat.hint ? `<span class="hint">(${cat.hint})</span>` : ""}</div>`;
}

function optionHTML(list, emptyText){
  let html = emptyText ? `<option value="0">${emptyText}</option>` : "";
  list.forEach(o=>{
    html += `<option value="${o[1]}">${o[0]}${o[1] ? " +$"+o[1] : ""}</option>`;
  });
  return html;
}

function renderMenu(){
  menu.innerHTML = "";
  categories.forEach((cat, ci)=>{
    const direct = cat.mode === "direct";
    if(direct){
      let rows = "";
      cat.items.forEach((item, ii)=>{
        rows += `<tr>
          <td>${item.name}</td>
          <td>$${item.price}</td>
          <td><input class="qty direct-qty" type="number" min="0" value="0" data-cat="${cat.name}" data-name="${item.name}" data-price="${item.price}" oninput="calculate()"></td>
          <td><input class="direct-remark remark" type="text" placeholder="備註"></td>
          <td class="line-sub">$0</td>
        </tr>`;
      });
      menu.innerHTML += `<div class="category direct">${categoryTitle(cat)}<div class="table-wrap"><table>
        <colgroup><col class="col-item"><col class="col-price"><col class="col-qty"><col class="col-remark"><col class="col-sub"></colgroup>
        <thead><tr><th>品項</th><th>單價</th><th>數量</th><th>備註</th><th>小計</th></tr></thead>
        <tbody>${rows}</tbody></table></div></div>`;
      return;
    }

    let rows = "";
    cat.items.forEach((item, ii)=>{
      const hasMain = cat.mode === "mainAddon" || cat.mode === "custom" || item.mainSet;
      rows += `<tr class="product-row" id="product-${ci}-${ii}">
        <td>${item.name}</td>
        <td>$${item.price}</td>
        <td class="blank"></td>
        ${hasMain ? "<td class='blank'></td>" : ""}
        <td class="blank"></td>
        ${cat.remark ? "<td class='blank'></td>" : ""}
        <td class="blank"></td>
        <td><button class="add" type="button" onclick="addLine(${ci},${ii})">新增一筆</button></td>
      </tr>`;
    });

    const hasMainCol = cat.mode === "mainAddon" || cat.mode === "custom";
    const remarkCol = cat.remark ? '<col class="col-remark">' : '';
    const remarkTh = cat.remark ? '<th>備註</th>' : '';
    menu.innerHTML += `<div class="category">${categoryTitle(cat)}<div class="table-wrap"><table>
      <colgroup><col class="col-item"><col class="col-price"><col class="col-qty">${hasMainCol ? '<col class="col-main">' : ''}<col class="col-addon">${remarkCol}<col class="col-sub"><col class="col-action"></colgroup>
      <thead><tr><th>品項</th><th>單價</th><th>數量</th>${hasMainCol ? '<th>主食</th>' : ''}<th>${cat.addonTitle}</th>${remarkTh}<th>小計</th><th>操作</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
  });
}

function addLine(ci, ii){
  const cat = categories[ci];
  const item = cat.items[ii];
  const productRow = document.getElementById(`product-${ci}-${ii}`);
  const hasMain = cat.mode === "mainAddon" || cat.mode === "custom" || item.mainSet;

  const mainCell = hasMain
    ? (item.mainSet || cat.mainSet
      ? `<td><select class="mainfood" onchange="calculate()">${optionHTML(mainSets[item.mainSet || cat.mainSet],"")}</select></td>`
      : `<td class="blank">—</td>`)
    : "";

  const addonCell = `<td><select class="addon" onchange="calculate()">${optionHTML(optionSets[item.addonSet],"無")}</select></td>`;
  const remarkCell = cat.remark ? `<td><input class="remark" type="text" placeholder="備註"></td>` : "";

  const row = document.createElement("tr");
  row.className = "order-line";
  row.dataset.cat = cat.name;
  row.dataset.name = item.name;
  row.dataset.price = item.price;
  row.innerHTML = `
    <td style="text-align:left;padding-left:26px">↳ ${item.name}</td>
    <td>$${item.price}</td>
    <td><input class="qty" type="number" min="1" value="1" oninput="calculate()"></td>
    ${mainCell}
    ${addonCell}
    ${remarkCell}
    <td class="line-sub">$${item.price}</td>
    <td><button class="delete" type="button" onclick="this.closest('tr').remove();calculate()">刪除</button></td>
  `;
  productRow.insertAdjacentElement("afterend", row);
  calculate();
}

function calculate(){
  let qtyTotal = 0, amountTotal = 0;
  document.querySelectorAll(".order-line").forEach(row=>{
    const qty = Number(row.querySelector(".qty").value || 0);
    const base = Number(row.dataset.price || 0);
    const main = row.querySelector(".mainfood") ? Number(row.querySelector(".mainfood").value || 0) : 0;
    const addon = row.querySelector(".addon") ? Number(row.querySelector(".addon").value || 0) : 0;
    const subtotal = qty * (base + main + addon);
    qtyTotal += qty;
    amountTotal += subtotal;
    row.querySelector(".line-sub").textContent = `$${subtotal}`;
  });

  document.querySelectorAll(".direct-qty").forEach(input=>{
    const qty = Number(input.value || 0);
    const price = Number(input.dataset.price || 0);
    const subtotal = qty * price;
    qtyTotal += qty;
    amountTotal += subtotal;
    input.closest("tr").querySelector(".line-sub").textContent = `$${subtotal}`;
  });

  document.getElementById("qtyTotal").textContent = qtyTotal;
  const drinkBagFee = Number(document.querySelector('input[name="drinkBag"]:checked')?.value || 0);
  amountTotal += drinkBagFee;
  document.getElementById("amountTotal").textContent = `$${amountTotal}`;
  const mobileQty = document.getElementById("mobileQtyTotal");
  const mobileAmount = document.getElementById("mobileAmountTotal");
  if(mobileQty) mobileQty.textContent = qtyTotal;
  if(mobileAmount) mobileAmount.textContent = `$${amountTotal}`;
}

function validateOrder(){
  const takeType = document.getElementById("takeType").value;
  const address = document.getElementById("address").value.trim();
  if(takeType === "外送" && !address){
    alert("取餐方式為外送時，外送地址為必填。");
    document.getElementById("address").focus();
    return false;
  }
  return true;
}

function getOrderText(){
  if(!validateOrder()) return "";
  const lines = [];
  lines.push("【192巷食堂】");
  lines.push(`姓名：${document.getElementById("name").value || "未填"}`);
  lines.push(`電話：${document.getElementById("phone").value || "未填"}`);
  lines.push(`取餐方式：${document.getElementById("takeType").value}`);
  lines.push(`外送地址：${document.getElementById("address").value || "未填"}`);
  lines.push(`公司名稱：${document.getElementById("company").value || "未填"}`);
  lines.push(`希望抵達時間：${document.getElementById("arriveTime").value || "未填"}`);
  lines.push(`餐具：${document.getElementById("utensils").value}`);
  const drinkBagFeeHeader = Number(document.querySelector('input[name="drinkBag"]:checked')?.value || 0);
  lines.push(`加購飲料袋：${drinkBagFeeHeader === 1 ? "需要 (+$1)" : "不需要"}`);
  lines.push("");
  lines.push("訂購內容：");

  let qtyTotal = 0, amountTotal = 0;

  document.querySelectorAll(".order-line").forEach(row=>{
    const qty = Number(row.querySelector(".qty").value || 0);
    const base = Number(row.dataset.price || 0);
    const mainEl = row.querySelector(".mainfood");
    const addonEl = row.querySelector(".addon");
    const remarkEl = row.querySelector(".remark");
    const mainPrice = mainEl ? Number(mainEl.value || 0) : 0;
    const addonPrice = addonEl ? Number(addonEl.value || 0) : 0;
    const unit = base + mainPrice + addonPrice;
    const subtotal = unit * qty;
    qtyTotal += qty;
    amountTotal += subtotal;

    let detail = `${row.dataset.cat}｜${row.dataset.name}`;
    if(mainEl) detail += `｜主食:${mainEl.options[mainEl.selectedIndex].text}`;
    if(addonEl) detail += `｜加購:${addonEl.options[addonEl.selectedIndex].text}`;
    if(remarkEl && remarkEl.value.trim()) detail += `｜備註:${remarkEl.value.trim()}`;
    detail += `｜$${unit} x ${qty} = $${subtotal}`;
    lines.push(detail);
  });

  document.querySelectorAll(".direct-qty").forEach(input=>{
    const qty = Number(input.value || 0);
    if(qty > 0){
      const price = Number(input.dataset.price || 0);
      const subtotal = qty * price;
      qtyTotal += qty;
      amountTotal += subtotal;
      const remarkEl = input.closest("tr").querySelector(".direct-remark");
      const remarkText = remarkEl && remarkEl.value.trim() ? `｜備註:${remarkEl.value.trim()}` : "";
      lines.push(`${input.dataset.cat}｜${input.dataset.name}${remarkText}｜$${price} x ${qty} = $${subtotal}`);
    }
  });

  const drinkBagFeeOrder = Number(document.querySelector('input[name="drinkBag"]:checked')?.value || 0);
  amountTotal += drinkBagFeeOrder;
  if(drinkBagFeeOrder > 0){
    lines.push(`加購飲料袋｜$1 x 1 = $1`);
  }

  if(qtyTotal === 0) lines.push("尚未選擇品項");
  lines.push("");
  lines.push(`總數量：${qtyTotal} 份`);
  lines.push(`總金額：$${amountTotal}`);
  lines.push(`整體備註：${document.getElementById("memo").value || "無"}`);
  return lines.join("\n");
}

async function copyOrder(){
  const text = getOrderText();
  if(!text) return;
  await navigator.clipboard.writeText(text);
  alert("訂單文字已複製");
}


async function submitOrder(){
  const text = getOrderText();
  if(!text) return;

  if(!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE")){
    alert("尚未設定 Google Apps Script 收單網址。請先建立 Google Sheet 收單 Web App，並把網址貼到 HTML 內的 GOOGLE_SCRIPT_URL。");
    return;
  }

  const payload = buildOrderPayload(text);

  try{
    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    alert("訂單已送出！請至 Google Sheet 確認收單。");
    resetOrder();
  }catch(error){
    console.error(error);
    alert("送出失敗，請確認網路或 Google Apps Script 網址設定。");
  }
}

function buildOrderPayload(orderText){
  const items = [];
  let qtyTotal = 0;
  let amountTotal = 0;

  document.querySelectorAll(".order-line").forEach(row=>{
    const qty = Number(row.querySelector(".qty").value || 0);
    if(qty <= 0) return;

    const base = Number(row.dataset.price || 0);
    const mainEl = row.querySelector(".mainfood");
    const addonEl = row.querySelector(".addon");
    const remarkEl = row.querySelector(".remark");
    const mainPrice = mainEl ? Number(mainEl.value || 0) : 0;
    const addonPrice = addonEl ? Number(addonEl.value || 0) : 0;
    const unit = base + mainPrice + addonPrice;
    const subtotal = unit * qty;

    qtyTotal += qty;
    amountTotal += subtotal;

    items.push({
      category: row.dataset.cat,
      item: row.dataset.name,
      qty,
      basePrice: base,
      mainFood: mainEl ? mainEl.options[mainEl.selectedIndex].text : "",
      addon: addonEl ? addonEl.options[addonEl.selectedIndex].text : "",
      remark: remarkEl ? remarkEl.value.trim() : "",
      unitPrice: unit,
      subtotal
    });
  });

  document.querySelectorAll(".direct-qty").forEach(input=>{
    const qty = Number(input.value || 0);
    if(qty <= 0) return;

    const price = Number(input.dataset.price || 0);
    const subtotal = qty * price;
    qtyTotal += qty;
    amountTotal += subtotal;

    const remarkEl = input.closest("tr").querySelector(".direct-remark");
    items.push({
      category: input.dataset.cat,
      item: input.dataset.name,
      qty,
      basePrice: price,
      mainFood: "",
      addon: "",
      remark: remarkEl ? remarkEl.value.trim() : "",
      unitPrice: price,
      subtotal
    });
  });

  const drinkBagFee = Number(document.querySelector('input[name="drinkBag"]:checked')?.value || 0);
  amountTotal += drinkBagFee;

  return {
    submittedAt: new Date().toLocaleString("zh-TW"),
    name: document.getElementById("name").value || "",
    phone: document.getElementById("phone").value || "",
    takeType: document.getElementById("takeType").value || "",
    address: document.getElementById("address").value || "",
    company: document.getElementById("company").value || "",
    arriveTime: document.getElementById("arriveTime").value || "",
    utensils: document.getElementById("utensils").value || "",
    drinkBag: drinkBagFee === 1 ? "需要(+1)" : "不需要",
    memo: document.getElementById("memo").value || "",
    qtyTotal,
    amountTotal,
    orderText,
    items
  };
}


function resetOrder(){
  document.querySelectorAll(".order-line").forEach(row=>row.remove());
  document.querySelectorAll(".direct-qty").forEach(input=>input.value=0);
  document.querySelectorAll(".direct-remark").forEach(input=>input.value="");
  calculate();
}

renderMenu();
toggleAddressRequired();
calculate();
</script>
