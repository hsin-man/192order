<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>192巷食堂｜V4.3卡片式點餐</title>
<style>
body{font-family:"Microsoft JhengHei",Arial,sans-serif;background:#f5ead8;margin:0;color:#333;padding-bottom:88px}
header{background:#5c6148;color:#fff;text-align:center;padding:20px 12px}
header h1{margin:0;font-size:28px}
header p{margin:8px 0 0;font-size:13px}
.container{max-width:960px;margin:auto;padding:12px}
.card{background:#fffaf0;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.12)}
h2{margin:0 0 12px;color:#b23b25;border-bottom:2px solid #d9a45f;padding-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
label{font-weight:bold;font-size:14px}
input,select,textarea{width:100%;box-sizing:border-box;padding:10px;border:1px solid #c9b89c;border-radius:8px;font-size:15px;background:white}
.notice{background:#fff4cc;border-left:6px solid #f08c00;padding:12px;border-radius:8px;line-height:1.7}
.red-bold{color:red;font-weight:bold}
.category{margin-bottom:18px}
.category-title{font-size:22px;font-weight:bold;color:#b23b25;margin:8px 0}
.hint{font-size:13px;color:#777;font-weight:normal;margin-left:4px}
.item-card{background:white;border:1px solid #eadcc6;border-radius:14px;padding:12px;margin:10px 0}
.item-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.item-name{font-weight:bold;font-size:17px}
.price{font-weight:bold;color:#c65f26;font-size:17px;white-space:nowrap}
.line-card{background:#fff8e8;border:1px dashed #d9a45f;border-radius:12px;padding:10px;margin-top:10px}
.row{display:grid;grid-template-columns:80px 1fr;gap:8px;align-items:center;margin:8px 0}
.qtybox{display:flex;align-items:center;gap:8px}
.qtybtn{width:34px;height:34px;border:0;border-radius:8px;background:#586047;color:white;font-size:20px}
.qty{width:64px;text-align:center}
.subtotal{text-align:right;font-weight:bold;color:#c92a2a;font-size:18px}
button{border:0;background:#c65f26;color:white;border-radius:10px;padding:10px 14px;font-size:15px;cursor:pointer}
button.add{background:#2f9e44;width:25%;min-width:92px;max-width:140px;margin-top:10px;display:block;margin-left:0;margin-right:auto}
button.delete{background:#868e96;width:100%;margin-top:8px}
.direct-qty{width:72px;text-align:center}
.direct-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.drinkbag label{font-weight:normal;margin-right:18px}
.mobile-cart{position:fixed;left:10px;right:10px;bottom:10px;z-index:9999;background:#fff3df;border:2px solid #d9a45f;border-radius:16px;box-shadow:0 4px 18px rgba(0,0,0,.25);overflow:hidden}
.mobile-cart-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;font-size:18px;font-weight:bold;color:#b23b25;cursor:pointer}
.mobile-cart-total{font-size:24px;color:#c92a2a}
.mobile-cart-panel{display:none;padding:12px 14px 16px;border-top:1px solid #d9a45f;background:#fffaf0}
.mobile-cart.open .mobile-cart-panel{display:block}
.mobile-cart-panel button{width:100%;margin:5px 0}
@media(max-width:700px){
  .grid{grid-template-columns:1fr}
  header h1{font-size:24px}
  .container{padding:8px}
  .card{padding:12px}
  .row{grid-template-columns:72px 1fr}
}
</style>
</head>
<body>
<header>
<h1>192巷食堂</h1><div style="font-size:12px;margin-top:4px;opacity:.85">V4.3.9 電話必填版</div>
<p>高雄市左營區文慈路192巷26號｜07-350-1245<br>營業時間 10:00–20:00</p>
</header>

<div class="container">
<div class="card">
<h2>訂購人資料</h2>
<div class="grid">
<div><label>姓名</label><input id="name" placeholder="請輸入姓名" autocomplete="off"></div>
<div><label>電話 <span style="color:red">*</span></label><input id="phone" placeholder="務必填寫電話" autocomplete="off" required></div>
<div><label>取餐方式</label><select id="takeType" onchange="toggleAddressRequired()"><option>外送</option><option>外帶</option><option>內用</option></select></div>
<div><label>外送地址 <span id="addressRequiredText" style="color:red">*</span></label><input id="address" placeholder="外送時必填" autocomplete="off"></div>
<div><label>公司名稱</label><input id="company" placeholder="請輸入公司名稱" autocomplete="off"></div>
<div><label>希望抵達時間</label><input id="arriveTime" placeholder="例如：18:30"></div>
<div><label>餐具</label><select id="utensils"><option>不需要餐具</option><option>需要餐具</option></select></div>
</div>
<p class="notice">外送注意事項:<br>2公里內滿500元可外送，需於90分鐘前預訂。<br><span class="red-bold">假日及國定假日無外送服務。</span></p>
</div>

<div class="card"><div id="menu"></div></div>

<div class="card drinkbag">
<h2>加購飲料袋 ($1元)</h2>
<label><input type="radio" name="drinkBag" value="0" checked onchange="calculate()" style="width:auto"> 不需要</label>
<label><input type="radio" name="drinkBag" value="1" onchange="calculate()" style="width:auto"> 需要 (+$1)</label>
</div>

<div class="card">
<h2>整體備註</h2>
<textarea id="memo" rows="4" placeholder="例如：不要辣、分開裝、指定取餐時間"></textarea>
</div>
</div>

<div class="mobile-cart" id="mobileCart">
  <div class="mobile-cart-bar" onclick="toggleCart()">
    <span>🛒 <span id="qtyTotal">0</span> 份</span>
    <span class="mobile-cart-total" id="amountTotal">$0</span>
  </div>
  <div class="mobile-cart-panel">
    <button onclick="copyOrder()">複製訂單文字</button>
    <button onclick="submitOrder()">送出訂單</button>
    <button style="background:#586047" onclick="resetOrder()">清空訂單</button>
  </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyC6rcxdjOABB5-0wPeTsouz-bWyqzLA96OBjHR5wiN3eexFWxnDqEjSpoN2lFHHXRi_w/exec";

const optionSets = {
  chefRice:[["加白飯",15],["加起司1片",15],["加起司2片",25]],
  chefPot:[["加白飯",15],["加意麵",15],["加寬冬粉",15],["加泡麵",15],["加烏龍麵",30],["加起司1片",15],["加起司2片",25]],
  pot:[["加白飯",15],["加意麵",15],["加寬冬粉",15],["加泡麵",15],["加烏龍麵",30],["加起司1片",15],["加起司2片",25],["加沙茶",5]],
  curryRice:[["加白飯",15],["加起司1片",15],["加起司2片",25],["加咖哩醬",40]],
  plainRice:[["加白飯",15],["加起司1片",15],["加起司2片",25]],
  stirMain:[["加意麵",15],["加烏龍麵",30],["加起司1片",15],["加起司2片",25]],
  stirNoodle:[["加泡麵",15],["加起司1片",15],["加起司2片",25]],
  combo:[["冰淇淋紅茶",30],["紅茶牛奶",20],["泰式奶茶",30],["柚子茶",20],["無糖綠茶",5]]
};
const mainSets = {
  pot:[["白飯",0],["寬冬粉",0],["泡麵",0],["意麵",0],["烏龍",20]],
  stirMain:[["意麵",0],["烏龍麵",20]]
};
const categories=[
{name:"主廚獨家｜飯類",hint:"加飯15元、加起司1片15元、2片25元",mode:"multi",items:[
{name:"🌶️泰椰豬肉飯",price:160,addonSet:"chefRice"},
{name:"🌶️泰椰豬排飯",price:180,addonSet:"chefRice"},
{name:"🌶️泰椰唐揚雞飯",price:200,addonSet:"chefRice"},
{name:"🌶️泰椰炸蝦飯",price:200,addonSet:"chefRice"}]},
{name:"主廚獨家｜鍋類",hint:"加飯/加麵15元、加鳥龍麵30元、加起司1片15元、2片25元",mode:"multi",mainSet:"pot",items:[
{name:"🌶️泰椰豬肉鍋",price:180,addonSet:"chefPot"},
{name:"🌶️泰椰海鮮鍋",price:260,addonSet:"chefPot"},
{name:"🌶️🌶️私房麻辣燙",price:190,addonSet:"chefPot"},
{name:"🌶️起司麻奶鍋",price:210,addonSet:"chefPot"}]},
{name:"鍋燒",hint:"加飯/加麵15元、加鳥龍麵30元、加起司1片15元、2片25元，加沙茶5元",mode:"multi",mainSet:"pot",items:[
{name:"原味豬",price:100,addonSet:"pot"},{name:"原味蝦",price:100,addonSet:"pot"},{name:"泡菜",price:135,addonSet:"pot"},{name:"味噌",price:125,addonSet:"pot"},{name:"塔香蛤蜊",price:130,addonSet:"pot"},{name:"起司牛奶",price:150,addonSet:"pot"},{name:"蝦多多",price:170,addonSet:"pot"}]},
{name:"飯",hint:"加飯15元、加咖哩醬40元、加起司1片15元、2片25元",mode:"multi",items:[
{name:"🌶️唐揚雞咖哩飯",price:180,addonSet:"curryRice"},{name:"🌶️炸牡蠣咖哩飯",price:195,addonSet:"curryRice"},{name:"🌶️炸蝦咖哩飯",price:175,addonSet:"curryRice"},{name:"🌶️炸豬排咖哩飯",price:150,addonSet:"curryRice"},{name:"🌶️可樂餅咖哩飯",price:130,addonSet:"curryRice"},{name:"🌶️炸雞塊咖哩飯",price:125,addonSet:"curryRice"},{name:"🌶️咖哩雞肉飯",price:120,addonSet:"curryRice"},{name:"🌶️打拋豬肉飯",price:120,addonSet:"plainRice"},{name:"唐揚雞丼飯",price:150,addonSet:"plainRice"},{name:"炸豬排丼",price:135,addonSet:"plainRice"},{name:"滑蛋豬肉丼",price:120,addonSet:"plainRice"},{name:"肉燥飯",price:40,addonSet:"plainRice"}]},
{name:"鮮炒",hint:"加泡/意麵15元、加鳥龍麵30元、加起司1片15元、2片25元",mode:"multi",items:[
{name:"沙茶海鮮炒",price:100,mainSet:"stirMain",addonSet:"stirMain"},{name:"沙茶豬肉炒",price:100,mainSet:"stirMain",addonSet:"stirMain"},{name:"泡菜海鮮炒",price:125,mainSet:"stirMain",addonSet:"stirMain"},{name:"泡菜豬肉炒",price:125,mainSet:"stirMain",addonSet:"stirMain"},{name:"海鮮炒泡麵",price:110,addonSet:"stirNoodle"},{name:"豬肉炒泡麵",price:110,addonSet:"stirNoodle"},{name:"豬排炒泡麵",price:125,addonSet:"stirNoodle"}]},
{name:"炸物",mode:"direct",items:[{name:"唐揚雞",price:110},{name:"日式炸蝦(2隻)",price:99},{name:"廣島炸牡蠣(3顆)",price:99},{name:"廣島炸牡蠣(2顆)",price:75},{name:"起司可樂餅",price:90},{name:"青花椒香酥雞",price:69},{name:"手切馬鈴薯",price:55},{name:"炸雞塊",price:50},{name:"酥炸薯條",price:50},{name:"手工黑輪",price:50},{name:"手作芋球",price:40}]},
{name:"湯品",mode:"direct",items:[{name:"蛤蜊湯",price:45},{name:"蛋花湯",price:30}]},
{name:"小菜",mode:"direct",items:[{name:"蒜味鮮蝦",price:135},{name:"薑蒸蛤蜊",price:100},{name:"胡麻花椰菜",price:55},{name:"川燙時蔬",price:45},{name:"皮蛋豆腐",price:50}]},
{name:"飲品",mode:"direct",items:[{name:"冰淇淋紅茶",price:65},{name:"紅茶牛奶",price:55},{name:"私房紅茶",price:35},{name:"彈珠汽水",price:35},{name:"泰式奶茶",price:65},{name:"柚子茶",price:55},{name:"無糖綠茶",price:40}]},
{name:"套餐 : 凡點主食即可加購",mode:"multi",addonTitle:"換購飲料",items:[{name:"A套餐：酥炸脆薯＋私房紅茶",price:75,addonSet:"combo"},{name:"B套餐：手工黑輪＋私房紅茶",price:75,addonSet:"combo"},{name:"C套餐：川燙時蔬＋私房紅茶",price:70,addonSet:"combo"}]}
];

function optionHTML(list, empty="無"){
  let h = "";
  if(empty === "請選擇主食"){
    h = `<option value="REQUIRED" selected disabled>請選擇主食</option>`;
  }else{
    h = `<option value="0">${empty}</option>`;
  }
  list.forEach(o=>h+=`<option value="${o[1]}">${o[0]}${o[1]?" +$"+o[1]:""}</option>`);
  return h;
}
function renderMenu(){
  const menu=document.getElementById("menu"); menu.innerHTML="";
  categories.forEach((cat,ci)=>{
    let html=`<div class="category"><div class="category-title">${cat.name}${cat.hint?`<span class="hint">(${cat.hint})</span>`:""}</div>`;
    cat.items.forEach((item,ii)=>{
      html+=`<div class="item-card" data-ci="${ci}" data-ii="${ii}">
        <div class="item-head"><div class="item-name">${item.name}</div><div class="price">$${item.price}</div></div>`;
      if(cat.mode==="direct"){
        html+=`<div class="row"><label>數量</label><div class="qtybox"><button class="qtybtn" onclick="changeDirectQty(${ci},${ii},-1)">-</button><input class="qty direct-qty" id="direct-${ci}-${ii}" value="0" type="number" min="0" oninput="calculate()"><button class="qtybtn" onclick="changeDirectQty(${ci},${ii},1)">+</button></div></div>
        <div class="row"><label>備註</label><input class="direct-remark" id="direct-remark-${ci}-${ii}" placeholder="備註"></div>
        <div class="subtotal" id="direct-sub-${ci}-${ii}">$0</div>`;
      }else{
        html+=`<div id="lines-${ci}-${ii}"></div><button class="add" onclick="addLine(${ci},${ii})">新增一筆</button>`;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
    menu.innerHTML+=html;
  });
}
function changeDirectQty(ci,ii,delta){
  const el=document.getElementById(`direct-${ci}-${ii}`);
  el.value=Math.max(0,Number(el.value||0)+delta);
  calculate();
}
function addLine(ci,ii){
  const cat=categories[ci], item=cat.items[ii];
  const box=document.getElementById(`lines-${ci}-${ii}`);
  const id=`line-${ci}-${ii}-${Date.now()}-${Math.floor(Math.random()*1000)}`;
  const hasMain=item.mainSet||cat.mainSet;
  const main = hasMain ? `<div class="row"><label>主食</label><select class="mainfood" onchange="calculate()">${optionHTML(mainSets[item.mainSet||cat.mainSet],"請選擇主食")}</select></div>` : "";
  const addon = `<div class="row"><label>${cat.addonTitle||"加購"}</label><select class="addon" onchange="calculate()">${optionHTML(optionSets[item.addonSet],"無")}</select></div>`;
  const div=document.createElement("div");
  div.className="line-card";
  div.dataset.cat=cat.name; div.dataset.name=item.name; div.dataset.price=item.price;
  div.innerHTML=`<div class="row"><label>數量</label><div class="qtybox"><button class="qtybtn" onclick="changeLineQty('${id}',-1)">-</button><input class="qty" id="${id}" value="1" type="number" min="1" oninput="calculate()"><button class="qtybtn" onclick="changeLineQty('${id}',1)">+</button></div></div>
  ${main}${addon}
  <div class="row"><label>備註</label><input class="remark" placeholder="備註"></div>
  <div class="subtotal line-sub">$${item.price}</div>
  <button class="delete" onclick="this.closest('.line-card').remove();calculate()">刪除</button>`;
  box.appendChild(div); calculate();
}
function changeLineQty(id,delta){
  const el=document.getElementById(id);
  el.value=Math.max(1,Number(el.value||1)+delta);
  calculate();
}
function toggleAddressRequired(){
  const isDelivery=document.getElementById("takeType").value==="外送";
  document.getElementById("address").required=isDelivery;
  document.getElementById("addressRequiredText").style.display=isDelivery?"inline":"none";
}
function calculate(){
  let qtyTotal=0, amountTotal=0;
  document.querySelectorAll(".line-card").forEach(row=>{
    const qty=Number(row.querySelector(".qty").value||0);
    const base=Number(row.dataset.price||0);
    const main=row.querySelector(".mainfood") && row.querySelector(".mainfood").value!=="REQUIRED" ? Number(row.querySelector(".mainfood").value||0):0;
    const addon=row.querySelector(".addon")?Number(row.querySelector(".addon").value||0):0;
    const sub=qty*(base+main+addon);
    qtyTotal+=qty; amountTotal+=sub;
    row.querySelector(".line-sub").textContent=`$${sub}`;
  });
  categories.forEach((cat,ci)=>{
    if(cat.mode!=="direct") return;
    cat.items.forEach((item,ii)=>{
      const qty=Number(document.getElementById(`direct-${ci}-${ii}`).value||0);
      const sub=qty*item.price;
      qtyTotal+=qty; amountTotal+=sub;
      document.getElementById(`direct-sub-${ci}-${ii}`).textContent=`$${sub}`;
    });
  });
  const bag=Number(document.querySelector('input[name="drinkBag"]:checked')?.value||0);
  amountTotal+=bag;
  document.getElementById("qtyTotal").textContent=qtyTotal;
  document.getElementById("amountTotal").textContent=`$${amountTotal}`;
}
function validateOrder(){
  if(!document.getElementById("phone").value.trim()){
    alert("請務必填寫電話。");
    document.getElementById("phone").focus();
    return false;
  }
  if(document.getElementById("takeType").value==="外送" && !document.getElementById("address").value.trim()){
    alert("取餐方式為外送時，外送地址為必填。");
    document.getElementById("address").focus();
    return false;
  }
  return true;
}
function buildOrder(){
  if(!validateOrder()) return null;
  const lines=[], items=[]; let qtyTotal=0, amountTotal=0; let missingMainFood="";
  lines.push("【192巷食堂】");
  ["name","phone","takeType","address","company","arriveTime","utensils"].forEach(id=>{
    const label={name:"姓名",phone:"電話",takeType:"取餐方式",address:"外送地址",company:"公司名稱",arriveTime:"希望抵達時間",utensils:"餐具"}[id];
    lines.push(`${label}：${document.getElementById(id).value||"未填"}`);
  });
  const bag=Number(document.querySelector('input[name="drinkBag"]:checked')?.value||0);
  lines.push(`加購飲料袋：${bag?"需要 (+$1)":"不需要"}`); lines.push(""); lines.push("訂購內容：");
  document.querySelectorAll(".line-card").forEach(row=>{
    const qty=Number(row.querySelector(".qty").value||0); if(qty<=0)return;
    const base=Number(row.dataset.price||0);
    const mainEl=row.querySelector(".mainfood"), addonEl=row.querySelector(".addon"), remarkEl=row.querySelector(".remark");
    if(mainEl && mainEl.value==="REQUIRED"){
      missingMainFood=row.dataset.name;
      return;
    }
    const mainP=mainEl?Number(mainEl.value||0):0, addonP=addonEl?Number(addonEl.value||0):0;
    const unit=base+mainP+addonP, sub=unit*qty;
    qtyTotal+=qty; amountTotal+=sub;
    let d=`${row.dataset.cat}｜${row.dataset.name}`;
    if(mainEl && mainEl.value!=="REQUIRED")d+=`｜主食:${mainEl.options[mainEl.selectedIndex].text}`;
    if(addonEl)d+=`｜加購:${addonEl.options[addonEl.selectedIndex].text}`;
    if(remarkEl.value.trim())d+=`｜備註:${remarkEl.value.trim()}`;
    d+=`｜$${unit} x ${qty} = $${sub}`;
    lines.push(d); items.push(d);
  });
  if(missingMainFood){
    alert("「"+missingMainFood+"」請先選擇主食。");
    return null;
  }

  categories.forEach((cat,ci)=>{
    if(cat.mode!=="direct")return;
    cat.items.forEach((item,ii)=>{
      const qty=Number(document.getElementById(`direct-${ci}-${ii}`).value||0); if(qty<=0)return;
      const remark=document.getElementById(`direct-remark-${ci}-${ii}`).value.trim();
      const sub=qty*item.price; qtyTotal+=qty; amountTotal+=sub;
      lines.push(`${cat.name}｜${item.name}${remark?`｜備註:${remark}`:""}｜$${item.price} x ${qty} = $${sub}`);
    });
  });
  if(bag){amountTotal+=1; lines.push("加購飲料袋｜$1 x 1 = $1");}
  if(qtyTotal===0)lines.push("尚未選擇品項");
  lines.push(""); lines.push(`總數量：${qtyTotal} 份`); lines.push(`總金額：$${amountTotal}`); lines.push(`整體備註：${document.getElementById("memo").value||"無"}`);
  return {text:lines.join("\n"),qtyTotal,amountTotal,items};
}
async function copyOrder(){const o=buildOrder();if(!o)return;await navigator.clipboard.writeText(o.text);alert("訂單文字已複製");}
async function submitOrder(){
  const o=buildOrder(); if(!o)return;
  if(GOOGLE_SCRIPT_URL.includes("PASTE_")){alert("尚未設定 Google Apps Script 收單網址。");return;}
  await fetch(GOOGLE_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(o)});
  alert("訂單已送出！"); resetOrder();
}
function resetOrder(){document.querySelectorAll(".line-card").forEach(x=>x.remove());document.querySelectorAll(".direct-qty").forEach(x=>x.value=0);document.querySelectorAll(".direct-remark").forEach(x=>x.value="");calculate();}
function toggleCart(){document.getElementById("mobileCart").classList.toggle("open");}
renderMenu();toggleAddressRequired();calculate();
</script>
